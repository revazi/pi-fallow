name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bundle and health checks
        run: npm run check

      - name: Duplication check
        run: npm run dupes

      - name: Dead-code check
        run: npm run dead-code

      - name: Fallow CLI smoke checks
        run: npm run smoke:fallow

      - name: Package contents check
        run: npm run pack:check
